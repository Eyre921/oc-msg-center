# =============================================================================
# oc-msg-center · CNB 云原生构建配置（原生矩阵 amd64+arm64 并行）
#
# 仓库托管：lib/clawify (cnb.cool)
# 镜像产物：docker.cnb.cool/lib/clawify:{main|sha-XXXX|vX.Y.Z|latest}
# 触发：push main + tag_push v*.*.*
# =============================================================================

.docker-base: &docker-base
  docker:
    image: alpine:3.20
  services: [docker]
  env:
    IMAGE: ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}


.amd64-stages: &amd64-stages
  - name: ensure buildx
    script: |
      docker buildx version >/dev/null 2>&1 || apk add --no-cache docker-cli-buildx
      docker buildx version
  - name: docker buildx build & push center (amd64 native)
    script: |
      set -eu
      SHA="${CNB_COMMIT:0:7}"
      REF="${CNB_BRANCH}"
      docker buildx build --platform linux/amd64 \
        -t "${IMAGE}:${REF}-amd64" \
        -t "${IMAGE}:sha-${SHA}-amd64" \
        --label org.opencontainers.image.source="https://cnb.cool/${CNB_REPO_SLUG}" \
        --label org.opencontainers.image.revision="${CNB_COMMIT}" \
        --label org.opencontainers.image.version="${REF}" \
        --label org.opencontainers.image.title="oc-msg-center" \
        --label org.opencontainers.image.description="Self-hosted notification hub for QQ / WeChat via OpenClaw plugins" \
        --push \
        .
  - name: docker buildx build & push bridge (amd64 native)
    script: |
      set -eu
      SHA="${CNB_COMMIT:0:7}"
      REF="${CNB_BRANCH}"
      docker buildx build --platform linux/amd64 \
        -t "${IMAGE}:bridge-${REF}-amd64" \
        -t "${IMAGE}:bridge-sha-${SHA}-amd64" \
        --label org.opencontainers.image.source="https://cnb.cool/${CNB_REPO_SLUG}" \
        --label org.opencontainers.image.revision="${CNB_COMMIT}" \
        --label org.opencontainers.image.title="oc-msg-center-bridge" \
        --label org.opencontainers.image.description="Sidecar that wraps openclaw CLI as an HTTP bridge for oc-msg-center" \
        --push \
        bridges/openclaw-cli
  - name: signal amd64 done
    type: cnb:resolve
    options:
      key: arch-amd64-done


.arm64-stages: &arm64-stages
  - name: ensure buildx
    script: |
      docker buildx version >/dev/null 2>&1 || apk add --no-cache docker-cli-buildx
      docker buildx version
  - name: docker buildx build & push center (arm64 native)
    script: |
      set -eu
      SHA="${CNB_COMMIT:0:7}"
      REF="${CNB_BRANCH}"
      docker buildx build --platform linux/arm64 \
        -t "${IMAGE}:${REF}-arm64" \
        -t "${IMAGE}:sha-${SHA}-arm64" \
        --label org.opencontainers.image.source="https://cnb.cool/${CNB_REPO_SLUG}" \
        --label org.opencontainers.image.revision="${CNB_COMMIT}" \
        --label org.opencontainers.image.version="${REF}" \
        --label org.opencontainers.image.title="oc-msg-center" \
        --label org.opencontainers.image.description="Self-hosted notification hub for QQ / WeChat via OpenClaw plugins" \
        --push \
        .
  - name: docker buildx build & push bridge (arm64 native)
    script: |
      set -eu
      SHA="${CNB_COMMIT:0:7}"
      REF="${CNB_BRANCH}"
      docker buildx build --platform linux/arm64 \
        -t "${IMAGE}:bridge-${REF}-arm64" \
        -t "${IMAGE}:bridge-sha-${SHA}-arm64" \
        --label org.opencontainers.image.source="https://cnb.cool/${CNB_REPO_SLUG}" \
        --label org.opencontainers.image.revision="${CNB_COMMIT}" \
        --label org.opencontainers.image.title="oc-msg-center-bridge" \
        --label org.opencontainers.image.description="Sidecar that wraps openclaw CLI as an HTTP bridge for oc-msg-center" \
        --push \
        bridges/openclaw-cli
  - name: signal arm64 done
    type: cnb:resolve
    options:
      key: arch-arm64-done


.manifest-pipeline: &manifest-pipeline
  runner:
    tags: cnb:arch:amd64
    cpus: 2
  docker:
    image: alpine:3.20
  services: [docker]
  env:
    IMAGE: ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}
  stages:
    - name: wait amd64 done
      type: cnb:await
      options:
        key: arch-amd64-done
    - name: wait arm64 done
      type: cnb:await
      options:
        key: arch-arm64-done
    - name: ensure buildx
      script: |
        docker buildx version >/dev/null 2>&1 || apk add --no-cache docker-cli-buildx
        docker buildx version
    - name: merge primary + sha manifest lists (center + bridge)
      script: |
        set -eu
        SHA="${CNB_COMMIT:0:7}"
        REF="${CNB_BRANCH}"
        # center
        docker buildx imagetools create -t "${IMAGE}:${REF}" \
          "${IMAGE}:${REF}-amd64" "${IMAGE}:${REF}-arm64"
        docker buildx imagetools create -t "${IMAGE}:sha-${SHA}" \
          "${IMAGE}:sha-${SHA}-amd64" "${IMAGE}:sha-${SHA}-arm64"
        # bridge
        docker buildx imagetools create -t "${IMAGE}:bridge-${REF}" \
          "${IMAGE}:bridge-${REF}-amd64" "${IMAGE}:bridge-${REF}-arm64"
        docker buildx imagetools create -t "${IMAGE}:bridge-sha-${SHA}" \
          "${IMAGE}:bridge-sha-${SHA}-amd64" "${IMAGE}:bridge-sha-${SHA}-arm64"
    - name: extra release tags (when CNB_BRANCH starts with v)
      script: |
        set -eu
        case "$CNB_BRANCH" in
          v*)
            VERSION="${CNB_BRANCH#v}"
            docker buildx imagetools create -t "${IMAGE}:${VERSION}" \
              "${IMAGE}:${CNB_BRANCH}-amd64" "${IMAGE}:${CNB_BRANCH}-arm64"
            if ! echo "$CNB_BRANCH" | grep -q -- '-'; then
              MAJOR="${VERSION%%.*}"
              MR="${VERSION#*.}"
              MINOR="${MR%%.*}"
              for t in "${MAJOR}.${MINOR}" "${MAJOR}" "latest"; do
                docker buildx imagetools create -t "${IMAGE}:${t}" \
                  "${IMAGE}:${CNB_BRANCH}-amd64" "${IMAGE}:${CNB_BRANCH}-arm64"
              done
            fi
            ;;
          *)
            echo "branch-style ref ($CNB_BRANCH), no extra release tags"
            ;;
        esac
    - name: merge :latest (always = latest build, center + bridge)
      script: |
        set -eu
        REF="${CNB_BRANCH}"
        docker buildx imagetools create -t "${IMAGE}:latest" \
          "${IMAGE}:${REF}-amd64" "${IMAGE}:${REF}-arm64"
        docker buildx imagetools create -t "${IMAGE}:bridge-latest" \
          "${IMAGE}:bridge-${REF}-amd64" "${IMAGE}:bridge-${REF}-arm64"
    - name: signal manifest merge done
      type: cnb:resolve
      options:
        key: manifest-merge-done


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# CI: Node 22 + TypeScript（npm + better-sqlite3 + vitest）
# 用 node:22 (debian 全镜像) 是因为 better-sqlite3 需要 python3+make+g++ 编译
# 原生绑定，全镜像自带 build-essential，省去 apt install 一步。
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

.ci-pipeline: &ci-pipeline
  runner:
    tags: cnb:arch:amd64
    cpus: 4
  docker:
    image: node:22
    volumes:
      - /root/.npm:copy-on-write
  env:
    npm_config_audit: "false"
    npm_config_fund: "false"
    HUSKY: "0"
  stages:
    - name: npm ci
      script: npm ci --no-audit --no-fund
    - name: tsc --noEmit
      script: npx tsc --noEmit
    - name: vitest run
      script: npx vitest run


"(main|master)":
  push:
    ci: *ci-pipeline
    amd64:
      <<: *docker-base
      runner: { tags: cnb:arch:amd64, cpus: 8 }
      stages: *amd64-stages
    arm64:
      <<: *docker-base
      runner: { tags: cnb:arch:arm64:v8, cpus: 8 }
      stages: *arm64-stages
    manifest: *manifest-pipeline
  pull_request:
    ci: *ci-pipeline


"v*.*.*":
  tag_push:
    amd64:
      <<: *docker-base
      runner: { tags: cnb:arch:amd64, cpus: 8 }
      stages: *amd64-stages
    arm64:
      <<: *docker-base
      runner: { tags: cnb:arch:arm64:v8, cpus: 8 }
      stages: *arm64-stages
    manifest: *manifest-pipeline
