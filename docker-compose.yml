# oc-msg-center — 拿来就能用版（无需 clone 仓库）
#
# 使用方式：
#   1) curl -O https://cnb.cool/lib/clawify/-/raw/main/docker-compose.yml
#   2) docker compose up -d
#
# 数据持久化在三个命名卷（msgcenter-data / qq-bridge-data / weixin-bridge-data），
# 删容器不会丢；删 stack（`docker compose down -v`）才会清理。
#
# 默认管理员密码：首次启动随机生成并打到 msg-center 日志里。
# 想固定？设环境变量 MSGCENTER_ADMIN_PASSWORD 即可。
services:
  msg-center:
    image: docker.cnb.cool/lib/clawify:latest
    container_name: oc-msg-center
    restart: unless-stopped
    pull_policy: always
    ports:
      - "${MSGCENTER_PORT:-2586}:2586"
    environment:
      MSGCENTER_BASE_URL: ${MSGCENTER_BASE_URL:-http://localhost:2586}
      MSGCENTER_ADMIN_USERNAME: ${MSGCENTER_ADMIN_USERNAME:-admin}
      MSGCENTER_ADMIN_PASSWORD: ${MSGCENTER_ADMIN_PASSWORD:-}
      MSGCENTER_ADMIN_TOKEN: ${MSGCENTER_ADMIN_TOKEN:-}
      MSGCENTER_WELCOME_MESSAGE: ${MSGCENTER_WELCOME_MESSAGE:-✅ 你已成功绑定运维通知中心。}
      MSGCENTER_LOG_LEVEL: ${MSGCENTER_LOG_LEVEL:-info}
      # 渠道配置内嵌为 JSON，无需挂载外部文件。
      MSGCENTER_CHANNELS: |
        [
          { "id": "qqbot", "label": "QQ", "type": "webhook", "enabled": true,
            "sendUrl": "http://qq-bridge:7081/send",
            "controlUrl": "http://qq-bridge:7081",
            "sendToken": "${BRIDGE_SHARED_TOKEN:-please-change-me}",
            "inboundToken": "${BRIDGE_SHARED_TOKEN:-please-change-me}" },
          { "id": "weixin", "label": "微信", "type": "webhook", "enabled": true,
            "sendUrl": "http://weixin-bridge:7082/send",
            "controlUrl": "http://weixin-bridge:7082",
            "sendToken": "${BRIDGE_SHARED_TOKEN:-please-change-me}",
            "inboundToken": "${BRIDGE_SHARED_TOKEN:-please-change-me}" },
          { "id": "console", "label": "Console (本地测试)", "type": "console", "enabled": true }
        ]
    volumes:
      - msgcenter-data:/data

  qq-bridge:
    image: docker.cnb.cool/lib/clawify:bridge-latest
    container_name: oc-msg-center-qq
    restart: unless-stopped
    pull_policy: always
    depends_on: [msg-center]
    environment:
      BRIDGE_CHANNEL_ID: qqbot
      BRIDGE_PORT: 7081
      BRIDGE_SEND_TOKEN: ${BRIDGE_SHARED_TOKEN:-please-change-me}
      BRIDGE_MSGCENTER_URL: http://msg-center:2586
      BRIDGE_MSGCENTER_INBOUND_TOKEN: ${BRIDGE_SHARED_TOKEN:-please-change-me}
    volumes:
      - qq-bridge-data:/root/.openclaw
    expose: ["7081"]

  weixin-bridge:
    image: docker.cnb.cool/lib/clawify:bridge-latest
    container_name: oc-msg-center-weixin
    restart: unless-stopped
    pull_policy: always
    depends_on: [msg-center]
    environment:
      BRIDGE_CHANNEL_ID: weixin
      BRIDGE_PORT: 7082
      BRIDGE_SEND_TOKEN: ${BRIDGE_SHARED_TOKEN:-please-change-me}
      BRIDGE_MSGCENTER_URL: http://msg-center:2586
      BRIDGE_MSGCENTER_INBOUND_TOKEN: ${BRIDGE_SHARED_TOKEN:-please-change-me}
      BRIDGE_OPENCLAW_PLUGIN: "@tencent-weixin/openclaw-weixin"
      BRIDGE_OPENCLAW_CHANNEL: openclaw-weixin
    volumes:
      - weixin-bridge-data:/root/.openclaw
    expose: ["7082"]
    stdin_open: true
    tty: true

volumes:
  msgcenter-data:
  qq-bridge-data:
  weixin-bridge-data:
