# oc-msg-center — 单镜像版（拿来就能用）
#
#   curl -O https://raw.githubusercontent.com/Eyre921/oc-msg-center/main/docker-compose.yml
#   docker login docker.cnb.cool        # 镜像仓库是私有的，首次需要登录
#   docker compose up -d
#
# 容器内已内嵌 openclaw runtime + QQ/微信 两个插件，启动时自动拉起 gateway。
# 每个同事的私人机器人凭据通过 web admin 添加，msg-center 自动 push 到 openclaw。
services:
  msg-center:
    image: docker.cnb.cool/lib/clawify:latest
    container_name: oc-msg-center
    restart: unless-stopped
    pull_policy: always
    ports:
      - "${MSGCENTER_PORT:-2586}:2586"
    environment:
      MSGCENTER_BASE_URL: ${MSGCENTER_BASE_URL:-http://localhost:2586}
      MSGCENTER_ADMIN_USERNAME: ${MSGCENTER_ADMIN_USERNAME:-admin}
      MSGCENTER_ADMIN_PASSWORD: ${MSGCENTER_ADMIN_PASSWORD:-}
      MSGCENTER_ADMIN_TOKEN: ${MSGCENTER_ADMIN_TOKEN:-}
      MSGCENTER_WELCOME_MESSAGE: ${MSGCENTER_WELCOME_MESSAGE:-✅ 你已成功绑定运维通知中心。}
      MSGCENTER_LOG_LEVEL: ${MSGCENTER_LOG_LEVEL:-info}
    volumes:
      - msgcenter-data:/data       # SQLite + 附件
      - openclaw-data:/root/.openclaw  # openclaw 多 bot token / 微信会话

volumes:
  msgcenter-data:
  openclaw-data:
