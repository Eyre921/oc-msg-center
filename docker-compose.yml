# One-key deploy: `docker compose up -d`
#
# Default stack starts msg-center + two bridge containers (one per channel).
# Bridges hold ZERO credentials at boot — every colleague's personal bot is
# pushed in by msg-center via the bridge's POST /bots endpoint after you click
# "为该用户添加机器人" in the web admin.
#
# So: bring this up once, log in to the web admin, then add a colleague's
# QQ AppID/Secret (or scan their WeChat QR) one user at a time.
services:
  msg-center:
    build: .
    image: oc-msg-center:latest
    container_name: oc-msg-center
    restart: unless-stopped
    ports:
      - "2586:2586"
    environment:
      MSGCENTER_BASE_URL: ${MSGCENTER_BASE_URL:-http://localhost:2586}
      MSGCENTER_ADMIN_USERNAME: ${MSGCENTER_ADMIN_USERNAME:-admin}
      MSGCENTER_ADMIN_PASSWORD: ${MSGCENTER_ADMIN_PASSWORD:-}
      MSGCENTER_ADMIN_TOKEN: ${MSGCENTER_ADMIN_TOKEN:-}
      MSGCENTER_CHANNELS_FILE: /etc/msgcenter/channels.json
      MSGCENTER_WELCOME_MESSAGE: ${MSGCENTER_WELCOME_MESSAGE:-✅ 你已成功绑定运维通知中心。}
      MSGCENTER_LOG_LEVEL: ${MSGCENTER_LOG_LEVEL:-info}
    volumes:
      - msgcenter-data:/data
      - ./channels.json:/etc/msgcenter/channels.json:ro

  qq-bridge:
    build: ./bridges/openclaw-cli
    image: oc-msg-center-bridge:latest
    container_name: oc-msg-center-qq
    restart: unless-stopped
    depends_on: [msg-center]
    environment:
      BRIDGE_CHANNEL_ID: qqbot
      BRIDGE_PORT: 7081
      BRIDGE_SEND_TOKEN: ${BRIDGE_SHARED_TOKEN:-please-change-me}
      BRIDGE_MSGCENTER_URL: http://msg-center:2586
      BRIDGE_MSGCENTER_INBOUND_TOKEN: ${BRIDGE_SHARED_TOKEN:-please-change-me}
    volumes:
      - qq-bridge-data:/root/.openclaw
    expose: ["7081"]

  weixin-bridge:
    build: ./bridges/openclaw-cli
    image: oc-msg-center-bridge:latest
    container_name: oc-msg-center-weixin
    restart: unless-stopped
    depends_on: [msg-center]
    environment:
      BRIDGE_CHANNEL_ID: weixin
      BRIDGE_PORT: 7082
      BRIDGE_SEND_TOKEN: ${BRIDGE_SHARED_TOKEN:-please-change-me}
      BRIDGE_MSGCENTER_URL: http://msg-center:2586
      BRIDGE_MSGCENTER_INBOUND_TOKEN: ${BRIDGE_SHARED_TOKEN:-please-change-me}
      BRIDGE_OPENCLAW_PLUGIN: "@tencent-weixin/openclaw-weixin"
      BRIDGE_OPENCLAW_CHANNEL: openclaw-weixin
    volumes:
      - weixin-bridge-data:/root/.openclaw
    expose: ["7082"]
    stdin_open: true
    tty: true

volumes:
  msgcenter-data:
  qq-bridge-data:
  weixin-bridge-data:
