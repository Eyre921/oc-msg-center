  #   build: ./bridges/openclaw-cli
  #   image: oc-msg-center-bridge:qq
  #   container_name: oc-msg-center-qq
  #   restart: unless-stopped
  #   depends_on: [msg-center]
  #   environment:
  #     BRIDGE_CHANNEL_ID: qqbot
  #     BRIDGE_PORT: 7081
  #     BRIDGE_SEND_TOKEN: ${QQ_SEND_TOKEN:-change-me}
  #     BRIDGE_MSGCENTER_URL: http://msg-center:2586
  #     BRIDGE_MSGCENTER_INBOUND_TOKEN: ${QQ_INBOUND_TOKEN:-change-me}
  #     QQBOT_APPID: ${QQBOT_APPID:?set QQBOT_APPID in .env}
  #     QQBOT_SECRET: ${QQBOT_SECRET:?set QQBOT_SECRET in .env}
  #   volumes:
  #     - qq-bridge-data:/root/.openclaw
  #   expose: ["7081"]

  # ---- WeChat bridge (uncomment + scan QR on first run) ---------------------
