# One-key deploy: docker compose up -d
#
# Default stack starts JUST oc-msg-center. The two bridge containers are
# pre-wired but commented out — uncomment + fill in your QQ AppID/AppSecret
# (and scan a QR for WeChat) to enable real delivery.
#
# Even without the bridges enabled the center is fully functional via web,
# SSE/WebSocket, raw HTTP POST and outbound webhooks (ntfy-style usage).
services:
  msg-center:
    build: .
    image: oc-msg-center:latest
    container_name: oc-msg-center
    restart: unless-stopped
    ports:
      - "2586:2586"
    environment:
      MSGCENTER_BASE_URL: ${MSGCENTER_BASE_URL:-http://localhost:2586}
      MSGCENTER_ADMIN_USERNAME: ${MSGCENTER_ADMIN_USERNAME:-admin}
      # Set MSGCENTER_ADMIN_PASSWORD to pin the web password; otherwise a random
      # password is generated on first boot and printed to docker logs.
      MSGCENTER_ADMIN_PASSWORD: ${MSGCENTER_ADMIN_PASSWORD:-}
      # Optional headless admin token (Authorization: Bearer …)
      MSGCENTER_ADMIN_TOKEN: ${MSGCENTER_ADMIN_TOKEN:-}
      # Channels are loaded from MSGCENTER_CHANNELS (JSON inline) or
      # MSGCENTER_CHANNELS_FILE (path to JSON file).
      MSGCENTER_CHANNELS_FILE: /etc/msgcenter/channels.json
      MSGCENTER_WELCOME_MESSAGE: ${MSGCENTER_WELCOME_MESSAGE:-✅ 你已成功绑定运维通知中心。}
      MSGCENTER_LOG_LEVEL: ${MSGCENTER_LOG_LEVEL:-info}
    volumes:
      - msgcenter-data:/data
      - ./channels.json:/etc/msgcenter/channels.json:ro

  # ---- QQ bridge (uncomment after filling appid/secret) ----------------------
