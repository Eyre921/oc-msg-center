<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OC Msg Center · 通知中心</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <header>
      <h1>OC <span>Msg Center</span></h1>
      <nav id="nav" hidden>
        <button data-tab="overview">概览</button>
        <button data-tab="users">用户</button>
        <button data-tab="groups">分组</button>
        <button data-tab="broadcast">广播</button>
        <button data-tab="webhooks">Webhooks</button>
        <button data-tab="tokens">Token</button>
        <button data-tab="stream">实时流</button>
        <button id="logoutBtn">退出</button>
      </nav>
    </header>

    <main id="loginPane">
      <section class="card">
        <h2>管理员登录</h2>
        <form id="loginForm">
          <label>用户名 <input name="username" required value="admin" /></label>
          <label>密码 <input name="password" type="password" required /></label>
          <button type="submit">登录</button>
        </form>
        <p class="muted">
          首次部署的随机密码会在容器日志里打印一次，配置 <code>MSGCENTER_ADMIN_PASSWORD</code>
          可显式指定。
        </p>
      </section>
    </main>

    <main id="appPane" hidden>
      <section class="tab" data-tab="overview">
        <h2>概览</h2>
        <div id="overviewBox" class="grid"></div>
        <p class="muted">
          推送一条测试消息：<br />
          <code>curl -d "hello" {{base}}/test</code>
        </p>
      </section>

      <section class="tab" data-tab="users" hidden>
        <h2>用户与绑定</h2>
        <form id="newUserForm" class="row">
          <input name="username" placeholder="新用户名（用于内部识别）" required />
          <button>创建用户并生成绑定二维码</button>
        </form>
        <div id="bindBox"></div>
        <table id="usersTable" class="data">
          <thead>
            <tr><th>用户名</th><th>角色</th><th>已绑定渠道</th><th>分组</th><th>操作</th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </section>

      <section class="tab" data-tab="groups" hidden>
        <h2>分组</h2>
        <form id="newGroupForm" class="row">
          <input name="name" placeholder="分组名（如 oncall-sre）" required />
          <input name="description" placeholder="描述（可选）" />
          <button>创建分组</button>
        </form>
        <div id="groupsBox"></div>
      </section>

      <section class="tab" data-tab="broadcast" hidden>
        <h2>广播</h2>
        <form id="publishForm">
          <div class="row">
            <label>目标
              <select name="targetType">
                <option value="group">分组</option>
                <option value="topic">主题</option>
              </select>
            </label>
            <input name="target" placeholder="分组名 / 主题名" required />
            <label>优先级
              <select name="priority">
                <option value="1">1 最低</option>
                <option value="2">2 低</option>
                <option value="3" selected>3 默认</option>
                <option value="4">4 高</option>
                <option value="5">5 紧急</option>
              </select>
            </label>
          </div>
          <label>标题 <input name="title" /></label>
          <label>正文（支持 Markdown） <textarea name="body" rows="6" required></textarea></label>
          <label>标签（逗号分隔） <input name="tags" /></label>
          <button>发送</button>
        </form>
        <p id="publishResult" class="muted"></p>
      </section>

      <section class="tab" data-tab="webhooks" hidden>
        <h2>出站 Webhooks</h2>
        <form id="newHookForm" class="row">
          <input name="topic" placeholder="主题" required />
          <input name="url" placeholder="https://example.com/hook" required />
          <input name="secret" placeholder="可选签名密钥" />
          <button>添加</button>
        </form>
        <table id="hooksTable" class="data">
          <thead><tr><th>主题</th><th>URL</th><th>签名</th><th>操作</th></tr></thead>
          <tbody></tbody>
        </table>
      </section>

      <section class="tab" data-tab="tokens" hidden>
        <h2>API Token</h2>
        <form id="newTokenForm" class="row">
          <input name="label" placeholder="标签（如 prometheus）" />
          <button>生成</button>
        </form>
        <p id="newTokenOut" class="warn"></p>
        <table id="tokensTable" class="data">
          <thead><tr><th>标签</th><th>权限</th><th>最后使用</th><th>操作</th></tr></thead>
          <tbody></tbody>
        </table>
      </section>

      <section class="tab" data-tab="stream" hidden>
        <h2>实时流（订阅任一主题）</h2>
        <form id="streamForm" class="row">
          <input name="topic" placeholder="主题名" required />
          <button>开始监听</button>
        </form>
        <pre id="streamOut"></pre>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
